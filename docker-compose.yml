services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: finsol-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [finsol]

  redis:
    image: redis:7-alpine
    container_name: finsol-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [finsol]

  postgres:
    image: postgres:16-alpine
    container_name: finsol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finsol
      POSTGRES_PASSWORD: finsol
      POSTGRES_DB: finsol
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsol -d finsol"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [finsol]

  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: finsol-producer
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [finsol]

  notification:
    build:
      context: .
      dockerfile: docker/Dockerfile.notification
    container_name: finsol-notification
    restart: unless-stopped
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [finsol]

volumes:
  rabbitmq-data:
  redis-data:
  postgres-data:

networks:
  finsol:
    driver: bridge
